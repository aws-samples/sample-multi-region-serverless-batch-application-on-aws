name: pr-validation
on:
  pull_request:
    branches:
      - main
    paths:
      - source/**
      - deployment/**
      - .github/workflows/pr-validation.yml
  workflow_dispatch: {}
jobs:
  cfn-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Run cfn-lint
        run: cfn-lint deployment/**/*.yaml deployment/**/*.yml --ignore-templates deployment/github-oidc-role.yaml --ignore-checks W3005,W2001,W8001,W1020,W7001,W1031,E1029,E3030
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest boto3 moto pyyaml hypothesis
      - name: Run tests
        run: pytest source/ -v --tb=short
